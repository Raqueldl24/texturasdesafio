<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="suelo" src="suelos.jpg">
        <img id="pared" src="paredes.jpg">
        <img id="viga" src="vigas.jpg">
        <img id="ranas" src="rana.jpg">
        <img id="flamingos" src="flamingo.jpg">
        <img id="ratones" src="raton.jpg">
        <img id="peces" src="pez.jpg">
      </a-assets>
      <a-entity>
         <a-box position="0 0.1 0" depth="3" height="0.2" width="3" rotation="0 0 0" src="#suelo"></a-box>
         <a-box position="0 1.7 -1.4" depth="3" height="0.2" width="3" rotation="0 90 90" src="#pared"></a-box></a-box>
         <a-box position="1.4 1.7 0" depth="3" height="0.2" width="3" rotation="90 0 90" src="#pared"></a-box></a-box>
         <a-box position="-1.4 1.7 0" depth="3" height="0.2" width="3" rotation="90 0 90" src="#pared"></a-box></a-box>
         <a-box position="0 3.2 0" depth="3" height="0.2" width="3" rotation="0 0 0" src="#viga" ></a-box>
      </a-entity>
       //figutas
      <a-box position="-0.5 0.45 0.5" rotation="0 45 0"  depth="0.5" height="0.5" width="0.5" src="#ratones"></a-box>
      <a-sphere position="0.5 0.7 0.75" radius="0.5" rotation="0 -55 0" src="#ranas"></a-sphere>
      <a-cylinder position="-0.7 1.2 -0.25" radius="0.25" height="2"  rotation="0 180 0"src="#flamingos" ></a-cylinder>
      <a-cone position="0.8 0.8 -0.3"  radius-bottom="0.5" height="1" src="#peces"></a-cone>
      <a-light position="3 3 3" type="ambient" rotation="0 0 0" color:#FFFFFF"></a-light>
      <a-sky position="0 1 0"color="#ECECEC"></a-sky>
      <a-entity id="rig" position="-3 1 3">
        <a-camera id="camera"position="3 1 3"></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
