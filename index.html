<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="suelo" src="suelos.jpg">
        <img id="paredes" src="paredes.jpg">
        <img id="vigas" src="vigas.jpg">
      </a-assets>
      <a-entity>
         <a-box position="0 0.1 0" depth="3" height="0.2" width="3" rotation="0 0 0" src="#suelo"></a-box>
         <a-box position="0 1.7 -1.4" depth="3" height="0.2" width="3" rotation="0 90 90" src="#paredes"></a-box></a-box>
         <a-box position="1.4 1.7 0" depth="3" height="0.2" width="3" rotation="90 0 90" src="#paredes"></a-box></a-box>
         <a-box position="-1.4 1.7 0" depth="3" height="0.2" width="3" rotation="90 0 90" src="#paredes"></a-box></a-box>
         <a-box position="0 3.2 0" depth="3" height="0.2" width="3" rotation="0 0 0" src="#vigas" ></a-box>
      </a-entity>
      <a-light position="3 3 3" type="ambient" rotation="0 0 0" color:#FFFFFF"></a-light>
      <a-sky position="0 1 0"color="#ECECEC"></a-sky>
      <a-entity id="rig" position="-3 1 3">
        <a-camera id="camera"position="3 1 3"></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
